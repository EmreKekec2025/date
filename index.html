<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>En vigtig besked 💌</title>

<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #ffe6f0;
    margin: 0;
    overflow: hidden;
}

.container {
    margin-top: 100px;
}

h1 {
    font-size: 40px;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

#yesBtn {
    background-color: #ff4da6;
    color: white;
}

#noBtn {
    background-color: #cccccc;
    position: relative;
}

#message {
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Vil du på date med mig? 🤪</h1>
    <button id="yesBtn">JA 🙃</button>
    <button id="noBtn">Nej...</button>
    <p id="message"></p>
</div>

<script>
let noCount = 0;
let runawayMode = false;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

const noTexts = [
    "Er du sikker?",
    "Helt sikker? 😅",
    "Tænk lige en ekstra gang..."
];

function moveNoButton() {
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.position = "absolute";
    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

noBtn.addEventListener("click", function() {

    if (!runawayMode) {
        if (noCount < noTexts.length) {
            message.textContent = noTexts[noCount];
            noCount++;

            // Gør JA større
            let currentSize = window.getComputedStyle(yesBtn).fontSize;
            let newSize = parseFloat(currentSize) + 6;
            yesBtn.style.fontSize = newSize + "px";
            yesBtn.style.padding = (newSize) + "px " + (newSize * 2) + "px";

        }

        if (noCount === 3) {
            runawayMode = true;
            message.textContent = "Okay okay... prøv at trykke nej igen 😏";
        }

    }
});

// Når runawayMode er aktiv, flytter den sig ved hover
noBtn.addEventListener("mouseover", function() {
    if (runawayMode) {
        moveNoButton();
    }
});

yesBtn.addEventListener("click", function() {
    document.body.innerHTML = `
        <div style="margin-top: 200px;">
            <h1>Det vidste jeg godt 🤫</h1>
            <p>Du synes jeg er sød 😎</p>
        </div>
    `;
});
</script>

</body>
</html>
