<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>En vigtig besked 💌</title>

<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #ffe6f0;
    margin: 0;
    overflow: hidden;
}

.container {
    margin-top: 100px;
}

h1 {
    font-size: 40px;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    position: relative;
}

#yesBtn {
    background-color: #ff4da6;
    color: white;
}

#noBtn {
    background-color: #cccccc;
    position: absolute;
}
</style>
</head>

<body>

<div class="container">
    <h1>Vil du på date med mig? 💖</h1>
    <button id="yesBtn">JA 💘</button>
    <button id="noBtn">Nej...</button>
</div>

<script>
let noCount = 0;
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

function moveNoButton() {
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

noBtn.addEventListener("mouseover", function() {
    noCount++;

    // Gør JA større
    let currentSize = window.getComputedStyle(yesBtn).fontSize;
    let newSize = parseFloat(currentSize) + 8;
    yesBtn.style.fontSize = newSize + "px";
    yesBtn.style.padding = (newSize) + "px " + (newSize * 2) + "px";

    // Flyt NEJ
    moveNoButton();

    // Efter 5 forsøg bliver den helt umulig
    if (noCount > 5) {
        noBtn.style.display = "none";
    }
});

yesBtn.addEventListener("click", function() {
    document.body.innerHTML = `
        <div style="margin-top: 200px;">
            <h1>YAAAY!!! 💕</h1>
            <p>Jeg glæder mig helt vildt 😍</p>
        </div>
    `;
});

// Start med at placere NEJ et tilfældigt sted
moveNoButton();
</script>

</body>
</html>
